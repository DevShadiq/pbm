server {
    listen 80;
    server_name sms.shadiqur.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sms.shadiqur.com;

    ssl_certificate     C:/nginx/ssl/shadiqur.com.crt;
    ssl_certificate_key C:/nginx/ssl/shadiqur.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20m;
    root D:/pbm/apps/api/dist/website;
    index index.html;

    # Keep API errors as API responses; do not send the website HTML instead.
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }

    # Files created by the API remain outside the frontend build directories.
    location /uploads/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        return 301 /admin/;
    }

    # The admin build is emitted to dist/admin and uses /admin/ as its base URL.
    location /admin/ {
        root D:/pbm/apps/api/dist;
        try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
